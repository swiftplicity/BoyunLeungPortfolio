<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Design Responsibilities</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0e1a;display:flex;align-items:center;justify-content:center;min-height:100vh}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;stroke-dashoffset:0!important}}
  @keyframes trace{to{stroke-dashoffset:0}}
  @keyframes twinkle{0%,100%{opacity:.55}50%{opacity:1}}
  #sky-frame{background:linear-gradient(160deg,#0a0e1a 0%,#0f1a2e 40%,#0c1424 100%);border-radius:12px;padding:40px;position:relative;overflow:hidden;aspect-ratio:3/2;width:100%;max-width:960px}
  canvas{position:absolute;top:0;left:0;pointer-events:none;width:100%;height:100%}
  .zone{position:absolute;border-radius:50%;opacity:0;transition:opacity 1.2s ease}
  .node-wrap{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:transform .2s ease}
  .node-wrap:hover{transform:translate(-50%,-50%) scale(1.12)}
  .sparkle{animation:twinkle var(--dur,3.5s) ease-in-out infinite;animation-delay:var(--del,0s)}
  .n-label{position:absolute;top:var(--lt,24px);left:50%;transform:translateX(-50%);white-space:nowrap;font-size:12px;font-weight:500;color:rgba(220,225,240,0.9);text-align:center;pointer-events:none}
  .n-sub{position:absolute;top:var(--st,40px);left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:rgba(160,170,200,0.6);text-align:center;pointer-events:none}
  .phase-label{position:absolute;font-size:20px;font-weight:500;letter-spacing:1px;text-transform:lowercase;pointer-events:none;opacity:0;transition:opacity 1.2s ease .3s}
  .phase-sub{position:absolute;font-size:10px;letter-spacing:2px;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity 1.2s ease .5s}
  #tooltip{position:absolute;pointer-events:none;opacity:0;transition:opacity .2s;background:rgba(12,18,36,0.92);border:0.5px solid rgba(100,120,180,0.3);border-radius:8px;padding:8px 14px;font-size:11px;color:rgba(180,190,220,0.85);max-width:200px;z-index:10}
</style>
</head>
<body>

<div id="sky-frame">
  <canvas id="stars"></canvas>

  <div class="zone" id="z-discover" style="left:3%;top:0;width:50%;height:55%;background:radial-gradient(ellipse at center,rgba(139,128,206,0.06) 0%,transparent 70%)"></div>
  <div class="zone" id="z-design" style="left:42%;top:25%;width:55%;height:55%;background:radial-gradient(ellipse at center,rgba(240,170,196,0.06) 0%,transparent 70%)"></div>
  <div class="zone" id="z-deliver" style="left:5%;top:52%;width:55%;height:48%;background:radial-gradient(ellipse at center,rgba(178,240,228,0.06) 0%,transparent 70%)"></div>

  <div class="phase-label" id="pl-discover" style="left:25%;top:6%;color:rgba(139,128,206,0.55)">discover</div>
  <div class="phase-sub" id="ps-discover" style="left:25%;top:calc(6% + 26px);color:rgba(139,128,206,0.35)">Research & understand</div>

  <div class="phase-label" id="pl-design" style="right:8%;top:28%;color:rgba(240,170,196,0.55);text-align:right">design</div>
  <div class="phase-sub" id="ps-design" style="right:8%;top:calc(28% + 26px);color:rgba(240,170,196,0.35);text-align:right">Shape & solve</div>

  <div class="phase-label" id="pl-deliver" style="left:8%;bottom:12%;color:rgba(178,240,228,0.55)">deliver</div>
  <div class="phase-sub" id="ps-deliver" style="left:8%;bottom:calc(12% - 26px);color:rgba(178,240,228,0.35)">Build & ship</div>

  <svg id="lines" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 900 600"></svg>
  <div id="tooltip"></div>
</div>

<script>
const W=900,H=600;

setTimeout(()=>{
  ['z-discover','z-design','z-deliver'].forEach(id=>document.getElementById(id).style.opacity='1');
  ['pl-discover','ps-discover','pl-design','ps-design','pl-deliver','ps-deliver'].forEach(id=>document.getElementById(id).style.opacity='1');
},100);

const colors={discover:'#8B80CE',design:'#F0AAC4',deliver:'#B2F0E4'};

function fourPointStar(sx,sy,color,glow){
  const rx=sx,ry=sy;
  const px=sx*0.12,py=sy*0.12;
  const fw=sx*2+20,fh=sy*2+20;
  const cx=fw/2,cy=fh/2;
  const d=`M${cx},${cy-ry} Q${cx+px},${cy-py} ${cx+rx},${cy} Q${cx+px},${cy+py} ${cx},${cy+ry} Q${cx-px},${cy+py} ${cx-rx},${cy} Q${cx-px},${cy-py} ${cx},${cy-ry}Z`;
  const glowR=glow||8;
  return `<svg width="${fw}" height="${fh}" viewBox="0 0 ${fw} ${fh}" style="display:block;overflow:visible"><defs><filter id="g-${sx}-${sy}" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur in="SourceGraphic" stdDeviation="${glowR}"/></filter></defs><path d="${d}" fill="${color}" opacity="0.35" filter="url(#g-${sx}-${sy})"/><path d="${d}" fill="${color}"/></svg>`;
}

const nodes=[
  {id:'own',x:420,y:280,label:'Ownership',sub:'End-to-end design',phase:null,color:'#F0D650',sx:12,sy:22,glow:12,dur:5,tip:'Owned the full product design lifecycle from first insight to shipped feature.'},
  {id:'scope',x:140,y:110,label:'Scope & metrics',sub:'Defined priorities',phase:'discover',sx:7,sy:14,glow:6,dur:3.2,tip:'Defined product scope, priorities, and success metrics upfront.'},
  {id:'interviews',x:520,y:80,label:'Stakeholder interviews',sub:'Workflows & constraints',phase:'discover',sx:5,sy:11,glow:5,dur:4.1,tip:'Conducted stakeholder interviews to map workflows and surface constraints.'},
  {id:'tickets',x:90,y:260,label:'Ticket analysis',sub:'Recurring issues',phase:'discover',sx:8,sy:15,glow:7,dur:3.7,tip:'Analyzed support ticket data to uncover recurring pain points.'},
  {id:'reqs',x:670,y:250,label:'Requirements',sub:'Insights to user flows',phase:'design',sx:6,sy:12,glow:5,dur:3.5,tip:'Translated research insights into product requirements and user flows.'},
  {id:'solutions',x:610,y:380,label:'Efficiency solutions',sub:'Response rates up',phase:'design',sx:8,sy:15,glow:7,dur:4.3,tip:'Designed solutions to improve agent efficiency and response rates.'},
  {id:'proactive',x:760,y:430,label:'Proactive support',sub:'Ticket volume down',phase:'design',sx:5,sy:11,glow:5,dur:3.9,tip:'Introduced proactive strategies to reduce inbound ticket volume.'},
  {id:'dev',x:250,y:430,label:'Dev partnership',sub:'Front-end contributions',phase:'deliver',sx:7,sy:13,glow:6,dur:3.4,tip:'Partnered closely with engineers and contributed to front-end implementation.'},
  {id:'agile',x:450,y:510,label:'Agile iteration',sub:'Ship, learn, refine',phase:'deliver',sx:8,sy:15,glow:7,dur:4.6,tip:'Worked iteratively in an agile environment — continuous shipping and learning.'},
];

const edges=[
  ['scope','own'],['interviews','own'],['tickets','own'],
  ['own','reqs'],['own','solutions'],['own','proactive'],
  ['solutions','dev'],['proactive','dev'],
  ['solutions','agile'],['proactive','agile'],
  ['scope','interviews'],['tickets','scope'],
  ['reqs','solutions'],['reqs','proactive'],
  ['dev','agile'],
  ['agile','scope'],['agile','tickets'],
];

const sky=document.getElementById('sky-frame');
const svgEl=document.getElementById('lines');
const tooltip=document.getElementById('tooltip');
const nodeMap={};
nodes.forEach(n=>nodeMap[n.id]=n);

edges.forEach(([a,b],i)=>{
  const na=nodeMap[a],nb=nodeMap[b];
  const mx=(na.x+nb.x)/2,my=(na.y+nb.y)/2;
  const dx=nb.x-na.x,dy=nb.y-na.y;
  const dist=Math.hypot(dx,dy);
  const off=(i%2===0?1:-1)*28;
  const cx=mx-dy/dist*off,cy=my+dx/dist*off;
  const len=dist*1.2;
  const edgeColor=na.phase?colors[na.phase]:(nb.phase?colors[nb.phase]:'#B8B4D8');
  const line=document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d',`M${na.x} ${na.y} Q${cx} ${cy} ${nb.x} ${nb.y}`);
  line.setAttribute('fill','none');
  line.setAttribute('stroke',edgeColor);
  line.setAttribute('stroke-width','0.5');
  line.setAttribute('opacity','0.25');
  line.setAttribute('stroke-dasharray',`${len}`);
  line.setAttribute('stroke-dashoffset',`${len}`);
  line.style.animation=`trace 1.5s ease ${i*0.1}s forwards`;
  svgEl.appendChild(line);
});

nodes.forEach((n,i)=>{
  const wrap=document.createElement('div');
  wrap.className='node-wrap';
  wrap.style.left=(n.x/W*100)+'%';
  wrap.style.top=(n.y/H*100)+'%';
  wrap.style.opacity='0';
  wrap.style.transition=`opacity .5s ease ${0.4+i*0.1}s, transform .2s ease`;
  setTimeout(()=>wrap.style.opacity='1',10);

  const nodeColor=n.phase?colors[n.phase]:n.color;

  const el=document.createElement('div');
  el.className='sparkle';
  el.style.setProperty('--dur',n.dur+'s');
  el.style.setProperty('--del',(i*0.5)+'s');
  el.innerHTML=fourPointStar(n.sx,n.sy,nodeColor,n.glow);

  const labelTop=n.sy+20;
  const lbl=document.createElement('div');
  lbl.className='n-label';
  lbl.style.setProperty('--lt',labelTop+'px');
  lbl.textContent=n.label;
  if(n.id==='own'){lbl.style.fontSize='14px';lbl.style.color='rgba(240,214,80,0.95)';}

  const sub=document.createElement('div');
  sub.className='n-sub';
  sub.style.setProperty('--st',(labelTop+16)+'px');
  sub.textContent=n.sub;

  wrap.appendChild(el);
  wrap.appendChild(lbl);
  wrap.appendChild(sub);

  wrap.addEventListener('mouseenter',()=>{
    tooltip.textContent=n.tip;
    tooltip.style.opacity='1';
    const rect=sky.getBoundingClientRect();
    const px=n.x/W*rect.width;
    const py=n.y/H*rect.height;
    let tx=px+20,ty=py-50;
    if(tx+200>rect.width-40)tx=px-210;
    if(ty<10)ty=py+30;
    tooltip.style.left=tx+'px';
    tooltip.style.top=ty+'px';
  });
  wrap.addEventListener('mouseleave',()=>tooltip.style.opacity='0');
  sky.appendChild(wrap);
});

const canvas=document.getElementById('stars');
const rect=sky.getBoundingClientRect();
canvas.width=rect.width*2;canvas.height=rect.height*2;
canvas.style.width='100%';canvas.style.height='100%';
const ctx=canvas.getContext('2d');
for(let i=0;i<250;i++){
  const sx=Math.random()*canvas.width,sy=Math.random()*canvas.height;
  const r=Math.random()*1.2+0.2;
  const bright=Math.random();
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
  ctx.fillStyle=`rgba(184,180,216,${bright<0.08?0.4:bright<0.25?0.14:0.05})`;
  ctx.fill();
}
</script>
</body>
</html>
